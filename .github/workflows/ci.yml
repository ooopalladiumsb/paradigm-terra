# PR-1/Track-A · A5 — CI. A THIN wrapper over the existing source of truth: the workflow calls `make`,
# `make` calls `scripts/repro.sh`. No build/test command is duplicated here. Required jobs gate merges
# on the already-proven invariants (typecheck · tests · vectors NORMATIVE · proof verifiers TS+Go).
# rust-parity was OPTIONAL on the first pass (toolchain tuning); since M1 (musl target provisioned,
# observed green on the runner) it is REQUIRED. Branch-protection required checks (set in repo settings):
#   ts-ops · freeze-gate · go-parity · rust-parity   (full TS == Rust == Go gate)

name: CI

on:
  pull_request:
  push:
    branches: [main, "consensus/**", "validation/**", "post-freeze/**", "track-a/**"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ts-ops:
    name: ts-ops (typecheck + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - name: setup (build TS packages in dependency order)
        run: make setup
      - name: typecheck (tsc --noEmit, all TS packages)
        run: make typecheck
      - name: tests (every TS package incl. the orchestrator operational suite)
        run: make parity-ts

  freeze-gate:
    name: freeze-gate (vectors NORMATIVE + proof verifiers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - uses: actions/setup-go@v5
        with: { go-version-file: orchestrator-go/go.mod }
      - run: make setup
      - name: vectors-check (every golden + tc-v2 manifest is NORMATIVE)
        run: make vectors-check
      - name: verify-proof-ts (Proof Package #1 via the TS node)
        run: make verify-proof-ts
      - name: verify-proof-go (Proof Package #1 via the independent Go node)
        run: make verify-proof-go

  go-parity:
    name: go-parity (TS == Go, all modules)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version-file: orchestrator-go/go.mod }
      - name: parity-go (go test ./... across every Go module)
        run: make parity-go

  rust-parity:
    name: rust-parity (TS == Rust)
    runs-on: ubuntu-latest
    # Promoted to REQUIRED (M1): observed green on the runner once the musl target was provisioned
    # (release-gate.md, 2026-06-09 M1). The full three-language gate is now TS == Rust == Go.
    steps:
      - uses: actions/checkout@v4
      # The crates' .cargo/config.toml force a fully self-contained x86_64-unknown-linux-musl
      # static build driven by the bundled rust-lld (the freeze's reproducibility model — no system
      # C toolchain assumed). The runner therefore needs the musl target std installed; rust-lld
      # ships with the toolchain already. Without `targets:` the action installs only the host gnu
      # std and the build fails at link setup (release-gate.md, 2026-06-09 finding).
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - name: parity-rs (cargo test across every crate)
        run: make parity-rs
