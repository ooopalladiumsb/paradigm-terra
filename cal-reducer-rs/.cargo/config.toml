# This environment has no system C toolchain (no cc/gcc) and no glibc dev CRT,
# so the default `x86_64-unknown-linux-gnu` target cannot link. Instead we
# cross-compile to a fully self-contained `x86_64-unknown-linux-musl` static
# binary: rustup ships the musl CRT (crt1.o, libc.a, ...) under the target's
# `self-contained/` dir, and we drive the link with the bundled `rust-lld`
# (the `gcc-ld/ld.lld` GNU-compatible wrapper) — no external linker needed.
#
# The resulting static binary runs on this glibc host without modification.

[build]
target = "x86_64-unknown-linux-musl"

[target.x86_64-unknown-linux-musl]
linker = "rust-lld"
rustflags = ["-C", "linker-flavor=ld.lld", "-C", "link-self-contained=yes"]
